┌────┐  ┌────┐  ┌────┐
│디자인│  │로직 │  │코드 │   ← 전문화된 AI 모델들
│모델 │  │모델 │  │모델 │
└────┘  └────┘  └────┘

<h1 id="step-2-ai-developer%EB%A1%9C-%EC%83%9D%EC%84%B1-10%EB%B6%84">Step 2: AI Developer로 생성 (10분)</h1>
<h3 id="%EC%8B%A4%EC%8A%B5-%EC%A7%84%ED%96%89-%EC%88%9C%EC%84%9C">실습 진행 순서</h3>

<p><strong>2.</strong> 프로젝트 타입 선택</p>
<ul>
<li><code>Simple Website</code> - 빠른 랜딩페이지 (추천!)</li>
<li><code>Full-stack App</code> - 복잡한 웹앱</li>
</ul>
<p><strong>3.</strong> 프롬프트 입력 → <strong>Generate</strong> 클릭</p>

<ul>

</ul>

<h1 id="qa">Q&amp;A</h1>
<h3 id="%EA%B6%81%EA%B8%88%ED%95%9C-%EC%A0%90%EC%9D%84-%EC%9E%90%EC%9C%A0%EB%A1%AD%EA%B2%8C-%EC%A7%88%EB%AC%B8%ED%95%B4%EC%A3%BC%EC%84%B8%EC%9A%94">궁금한 점을 자유롭게 질문해주세요!</h3>
<p><strong>자주 묻는 질문:</strong></p>
<p><strong>Q. 무료 계정으로 어디까지 가능한가요?</strong><br />
A. 기본적인 웹사이트 생성과 배포가 가능합니다. Pro 플랜은 더 많은 생성 횟수와 고급 기능을 제공합니다.</p>
<p><strong>Q. 생성된 코드를 직접 수정할 수 있나요?</strong><br />
A. 네! GitHub 연동 후 코드를 다운로드하여 직접 수정할 수 있습니다.</p>
<p><strong>Q. 학생들이 동시에 사용해도 문제없나요?</strong><br />

<p><strong>Q. 상업적 사용이 가능한가요?</strong><br />
A. GenSpark 이용약관을 확인해주세요. 일반적으로 생성된 코드의 소유권은 사용자에게 있습니다.</p>
